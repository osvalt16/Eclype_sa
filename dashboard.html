<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÉCLYPSE — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--noir:#030208;--violet:#1a0f2e;--vg:#8b5cf6;--or:#c9a227;--orc:#e8c547;--tx:#d4c9e8;--txp:#8a7fa0;--bor:rgba(201,162,39,.3);--bov:rgba(107,53,200,.4);--cy:#00d4ff;--rg:#e85a5a;--vt:#5ecfa0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--noir);color:var(--tx);font-family:'Crimson Pro',serif;font-size:17px;min-height:100vh}

/* ── AUTH ── */
#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#12082a 0%,#030208 65%)}
.auth-wrap{width:100%;max-width:400px;padding:0 1.5rem}
.auth-card{background:rgba(10,7,20,.85);border:1px solid rgba(201,162,39,.2);backdrop-filter:blur(12px);position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--or),transparent)}
.auth-logo{display:flex;flex-direction:column;align-items:center;padding:2.5rem 2rem 1.5rem;border-bottom:1px solid rgba(107,53,200,.2)}
.auth-logo img{height:56px;margin-bottom:1rem;filter:drop-shadow(0 0 12px rgba(201,162,39,.3))}
.auth-logo-title{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.45em;text-transform:uppercase;color:var(--or);opacity:.8}
.auth-body{padding:2rem}
.auth-field{margin-bottom:1.4rem}
.auth-label{display:block;font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(201,162,39,.7);margin-bottom:.5rem}
.auth-input{width:100%;background:rgba(3,2,8,.7);border:1px solid rgba(107,53,200,.3);border-bottom:1px solid rgba(201,162,39,.3);color:var(--tx);padding:.85rem 1rem;font-family:'Crimson Pro',serif;font-size:1rem;outline:none;transition:all .25s;letter-spacing:.02em}
.auth-input:focus{border-color:rgba(201,162,39,.5);background:rgba(3,2,8,.9);box-shadow:0 0 0 1px rgba(201,162,39,.1)}
.auth-remember{display:flex;align-items:center;gap:.7rem;font-size:.85rem;color:var(--txp);margin-bottom:1.8rem;cursor:pointer}
.auth-remember input{accent-color:var(--or);width:14px;height:14px}
.auth-btn{width:100%;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:#0a0614;background:linear-gradient(135deg,#c9a227,#e8c547);border:none;padding:1rem;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.auth-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .25s}
.auth-btn:hover::after{background:rgba(255,255,255,.08)}
.auth-msg{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.12em;text-align:center;padding:.65rem;margin-top:1rem;display:none;border:1px solid}
.auth-msg.err{color:var(--rg);border-color:rgba(232,90,90,.2);background:rgba(232,90,90,.05);display:block}
.auth-msg.ok{color:var(--vt);border-color:rgba(94,207,160,.2);background:rgba(94,207,160,.05);display:block}
.auth-footer{padding:.8rem 2rem 1.2rem;text-align:center;font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(138,127,160,.5);border-top:1px solid rgba(107,53,200,.15)}

/* ── TOPBAR ── */
#dash{display:none}
.topbar{background:rgba(3,2,8,.97);border-bottom:1px solid rgba(201,162,39,.12);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.tb-left{display:flex;align-items:center;gap:1rem}
.tb-left img{height:30px;opacity:.9}
.tb-title{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;color:var(--or);opacity:.8}
.tb-right{display:flex;align-items:center;gap:.6rem}
.tb-profil{display:flex;align-items:center;gap:.6rem;background:none;border:none;cursor:pointer;padding:.25rem .6rem;border:1px solid transparent;transition:all .2s}
.tb-profil:hover{border-color:rgba(201,162,39,.2)}
.tb-profil span{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.12em;color:var(--orc)}
.avatar{width:30px;height:30px;border-radius:50%;border:1px solid rgba(201,162,39,.4);background:var(--violet);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:.8rem;color:var(--or);overflow:hidden;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.tb-btn{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;background:none;border:1px solid rgba(107,53,200,.3);padding:.35rem .8rem;cursor:pointer;text-decoration:none;display:inline-block;color:var(--txp);transition:all .2s}
.tb-btn:hover{border-color:var(--or);color:var(--or)}
.tb-btn.danger{color:var(--rg);border-color:rgba(232,90,90,.25)}
.tb-btn.danger:hover{background:rgba(232,90,90,.08)}

/* ── CONTENT ── */
.dash-wrap{max-width:880px;margin:0 auto;padding:2.5rem 2rem}

/* ── PROFIL ── */
.profil-card{border:1px solid rgba(201,162,39,.15);background:linear-gradient(135deg,rgba(26,15,46,.5),rgba(10,7,20,.7));padding:1.8rem 2rem;margin-bottom:2rem;display:flex;align-items:center;gap:1.8rem;position:relative}
.profil-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(to bottom,var(--or),transparent)}
.profil-av{width:72px;height:72px;border-radius:50%;border:2px solid rgba(201,162,39,.3);background:var(--violet);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:1.8rem;color:var(--or);overflow:hidden;flex-shrink:0}
.profil-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.grade-badge{display:inline-flex;align-items:center;gap:.4rem;font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;padding:.18rem .7rem;border:1px solid;margin-bottom:.4rem}
.grade-badge.apply{color:#999;border-color:rgba(150,150,150,.3)}
.grade-badge.membre{color:var(--vg);border-color:rgba(139,92,246,.3)}
.grade-badge.veteran{color:var(--or);border-color:var(--bor)}
.grade-badge.sousofficier{color:#e88030;border-color:rgba(232,128,48,.3)}
.grade-badge.officier{color:var(--rg);border-color:rgba(232,90,90,.3)}
.profil-pseudo{font-family:'Cinzel',serif;font-size:1.3rem;color:#fff;margin-bottom:.2rem;display:flex;align-items:center;gap:.7rem}
.profil-x{display:inline-flex;opacity:.7;transition:opacity .2s}
.profil-x:hover{opacity:1}
.profil-x img{width:18px;height:18px;border-radius:50%}
.profil-role{font-size:.85rem;color:var(--txp);font-style:italic}
.roles-unlocked{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.5rem}
.role-tag{font-family:'Cinzel',serif;font-size:.44rem;letter-spacing:.1em;text-transform:uppercase;padding:.1rem .45rem;border:1px solid rgba(107,53,200,.3);color:var(--txp)}
.btn-edit-profil{position:absolute;top:1rem;right:1rem;font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;color:var(--or);background:none;border:1px solid rgba(201,162,39,.25);padding:.3rem .7rem;cursor:pointer;transition:all .2s}
.btn-edit-profil:hover{background:rgba(201,162,39,.08)}

/* ── PLANNING ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.sec-hdr h2{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;color:var(--or);opacity:.85}
.btn-new{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--or);background:none;border:1px solid rgba(201,162,39,.25);padding:.4rem .9rem;cursor:pointer;display:none;transition:all .2s}
.btn-new:hover{background:rgba(201,162,39,.08)}
#form-op{border:1px solid rgba(107,53,200,.3);padding:1.5rem;background:rgba(10,7,20,.8);margin-bottom:1.5rem;display:none}
#form-op.show{display:block}
.fg-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.fg label{display:block;font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(201,162,39,.7);margin-bottom:.4rem}
.fg input,.fg select,.fg textarea{width:100%;background:rgba(3,2,8,.8);border:1px solid rgba(107,53,200,.3);border-bottom:1px solid rgba(201,162,39,.25);color:var(--tx);padding:.65rem .9rem;font-family:'Crimson Pro',serif;font-size:.95rem;outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:rgba(201,162,39,.5)}
.fg select option{background:#1a0f2e}
.fg textarea{resize:vertical;min-height:70px}
.fg.full{grid-column:1/-1}
.form-actions{display:flex;gap:.8rem;justify-content:flex-end}
.btn-pub{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:#0a0614;background:linear-gradient(135deg,#c9a227,#e8c547);border:none;padding:.65rem 1.8rem;cursor:pointer}
.btn-cancel{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--txp);background:none;border:1px solid rgba(107,53,200,.3);padding:.65rem 1.5rem;cursor:pointer}
.ftabs{display:flex;border-bottom:1px solid rgba(107,53,200,.25);margin-bottom:1.2rem}
.ftab{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(--txp);background:none;border:none;padding:.6rem 1rem;cursor:pointer;position:relative;transition:color .2s}
.ftab::after{content:'';position:absolute;bottom:-1px;left:0;width:0;height:1px;background:var(--or);transition:width .3s}
.ftab.active{color:var(--or)}
.ftab.active::after{width:100%}
.plan-layout{display:grid;grid-template-columns:1fr 240px;gap:1.5rem;align-items:start}
.ev-list{display:flex;flex-direction:column;gap:.7rem}
.ev-item{border:1px solid rgba(107,53,200,.25);padding:1rem 1.2rem;background:rgba(7,5,15,.7);display:grid;grid-template-columns:48px 1fr auto;gap:1rem;align-items:center;transition:border-color .2s}
.ev-item:hover{border-color:rgba(201,162,39,.25)}
.ev-date{text-align:center}
.ev-date .d{font-family:'Cinzel',serif;font-size:1.6rem;color:var(--or);line-height:1}
.ev-date .m{font-family:'Cinzel',serif;font-size:.44rem;letter-spacing:.12em;text-transform:uppercase;color:var(--txp)}
.ev-tag{display:inline-block;font-family:'Cinzel',serif;font-size:.46rem;letter-spacing:.15em;text-transform:uppercase;padding:.1rem .5rem;margin-bottom:.25rem;border:1px solid}
.t-fo{color:var(--rg);border-color:rgba(232,90,90,.25)}
.t-pv{color:var(--vg);border-color:rgba(139,92,246,.25)}
.t-ev{color:var(--or);border-color:var(--bor)}
.t-mi{color:var(--vt);border-color:rgba(94,207,160,.25)}
.ev-nom{font-family:'Cinzel',serif;font-size:.8rem;color:#fff;margin-bottom:.15rem}
.ev-meta{font-size:.78rem;color:var(--txp)}
.btn-del{font-family:'Cinzel',serif;font-size:.46rem;letter-spacing:.1em;text-transform:uppercase;color:var(--rg);background:none;border:1px solid rgba(232,90,90,.2);padding:.25rem .5rem;cursor:pointer;white-space:nowrap}
.ev-empty{text-align:center;padding:2.5rem;color:var(--txp);border:1px dashed rgba(107,53,200,.2);font-style:italic;font-size:.9rem}

/* ── MINI CAL ── */
.mini-cal{border:1px solid rgba(201,162,39,.15);background:rgba(7,5,15,.85);padding:1.2rem}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-ttl{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--or)}
.cal-nav{background:none;border:1px solid rgba(107,53,200,.3);color:var(--txp);width:24px;height:24px;cursor:pointer;font-size:.75rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cal-nav:hover{border-color:var(--or);color:var(--or)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-dl{font-family:'Cinzel',serif;font-size:.42rem;color:var(--txp);padding-bottom:.35rem;text-transform:uppercase}
.cal-d{font-size:.7rem;color:var(--txp);padding:.28rem 0;position:relative}
.cal-d.ev{color:var(--orc)}
.cal-d.ev::after{content:'•';position:absolute;bottom:0;left:50%;transform:translateX(-50%);font-size:.35rem;color:var(--or)}
.cal-d.today{background:rgba(107,53,200,.25);border:1px solid rgba(107,53,200,.4);color:#fff}
.cal-d.empty{color:transparent}
.cal-leg{margin-top:1rem;padding-top:.8rem;border-top:1px solid rgba(107,53,200,.2)}
.cal-leg-t{font-family:'Cinzel',serif;font-size:.46rem;letter-spacing:.18em;text-transform:uppercase;color:var(--txp);margin-bottom:.5rem}
.leg-row{display:flex;align-items:center;gap:.5rem;font-size:.72rem;color:var(--txp);margin-bottom:.25rem}
.leg-dot{width:6px;height:6px;border-radius:1px;flex-shrink:0}

/* ── MODAL PROFIL ── */
.modal-bg{position:fixed;inset:0;z-index:500;background:rgba(3,2,8,.9);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:rgba(10,7,20,.98);border:1px solid rgba(201,162,39,.15);width:90%;max-width:460px;transform:translateY(20px);transition:transform .25s;max-height:90vh;overflow-y:auto}
.modal-bg.open .modal{transform:translateY(0)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.6rem;border-bottom:1px solid rgba(201,162,39,.12);position:sticky;top:0;background:rgba(10,7,20,.98)}
.modal-hdr h3{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.28em;text-transform:uppercase;color:var(--or)}
.modal-x{background:none;border:none;color:var(--txp);font-size:1.1rem;cursor:pointer}
.modal-body{padding:1.8rem 1.6rem}
.photo-zone{text-align:center;margin-bottom:1.5rem}
.photo-prev{width:72px;height:72px;border-radius:50%;border:2px solid rgba(201,162,39,.25);background:var(--violet);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:1.7rem;color:var(--or);margin:0 auto .7rem;overflow:hidden;cursor:pointer;position:relative}
.photo-prev img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.photo-ov{position:absolute;inset:0;background:rgba(0,0,0,.55);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s}
.photo-prev:hover .photo-ov{opacity:1}
.photo-ov span{font-family:'Cinzel',serif;font-size:.45rem;letter-spacing:.1em;text-transform:uppercase;color:#fff}
.btn-up{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;color:var(--or);background:none;border:1px solid rgba(201,162,39,.25);padding:.28rem .7rem;cursor:pointer;display:none}
.prog{display:none;margin-top:.5rem}
.prog.show{display:block}
.prog-bar{height:2px;background:rgba(107,53,200,.3);overflow:hidden}
.prog-fill{height:100%;background:var(--or);width:0%;transition:width .3s}
.prog-lbl{font-family:'Cinzel',serif;font-size:.46rem;color:var(--txp);margin-top:.25rem;text-align:center}
.mf{margin-bottom:1rem}
.mf label{display:block;font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(201,162,39,.7);margin-bottom:.4rem}
.mf input{width:100%;background:rgba(3,2,8,.9);border:1px solid rgba(107,53,200,.3);border-bottom:1px solid rgba(201,162,39,.25);color:var(--tx);padding:.65rem .9rem;font-family:'Crimson Pro',serif;font-size:.95rem;outline:none;transition:all .2s}
.mf input:focus{border-color:rgba(201,162,39,.5)}
.mf .hint{font-size:.72rem;color:var(--txp);margin-top:.28rem;font-style:italic}
.mdiv{border:none;border-top:1px solid rgba(107,53,200,.2);margin:1rem 0}
.modal-ftr{padding:1rem 1.6rem;border-top:1px solid rgba(201,162,39,.1);display:flex;gap:.7rem;justify-content:flex-end;position:sticky;bottom:0;background:rgba(10,7,20,.98)}
.btn-msave{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:#0a0614;background:linear-gradient(135deg,#c9a227,#e8c547);border:none;padding:.55rem 1.4rem;cursor:pointer}
.btn-mcancel{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--txp);background:none;border:1px solid rgba(107,53,200,.3);padding:.55rem 1.2rem;cursor:pointer}
.mmsg{text-align:center;padding:.45rem;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;display:none}
.mmsg.ok{color:var(--vt);display:block}
.mmsg.err{color:var(--rg);display:block}

.toast{position:fixed;bottom:2rem;right:2rem;background:rgba(10,7,20,.97);border:1px solid rgba(201,162,39,.3);border-left:3px solid var(--or);padding:.9rem 1.4rem;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.15em;color:var(--or);z-index:999;display:none}

/* ── TABLET ── */
@media(max-width:900px) {
  .plan-layout { grid-template-columns: 1fr; }
}

/* ── MOBILE ── */
@media(max-width:600px) {
  .topbar { padding: 0.7rem 1rem; }
  .tb-title { display: none; }
  .tb-btn { font-size: 0.5rem; padding: 0.3rem 0.55rem; letter-spacing: 0.1em; }
  .tb-profil span { display: none; }
  .nav-av { width: 28px; height: 28px; }

  .dash-wrap { padding: 1.2rem 1rem; }

  .profil-card { flex-direction: column; text-align: center; padding: 1.4rem 1rem; gap: 1rem; }
  .profil-av { width: 64px; height: 64px; font-size: 1.5rem; }
  .profil-pseudo { font-size: 1.1rem; justify-content: center; }
  .roles-unlocked { justify-content: center; }
  .btn-edit-profil { position: static; margin-top: 0.5rem; }

  .sec-hdr h2 { font-size: 0.62rem; }
  .btn-new { font-size: 0.55rem; padding: 0.35rem 0.7rem; }

  .fg-grid { grid-template-columns: 1fr; }
  .plan-layout { grid-template-columns: 1fr; }

  .ftab { font-size: 0.5rem; padding: 0.5rem 0.6rem; }

  .ev-item { grid-template-columns: 40px 1fr; gap: 0.8rem; padding: 0.8rem; }
  .ev-item > div:last-child { grid-column: 1/-1; display: flex; justify-content: flex-end; }
  .ev-date .d { font-size: 1.3rem; }
  .ev-nom { font-size: 0.75rem; }
  .btn-del { font-size: 0.42rem; }

  .mini-cal { margin-top: 0; }

  .modal { width: 100%; max-width: 100%; min-height: 50vh; border-radius: 0; border-left: none; border-right: none; border-bottom: none; align-self: flex-end; }
  .modal-bg { align-items: flex-end; }
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="https://osvalt16.github.io/Eclype_sa/Picsart_26-05-25_11-42-55-217.png" alt="Éclypse">
        <span class="auth-logo-title">Accès Membres</span>
      </div>
      <div class="auth-body">
        <div class="auth-field">
          <label class="auth-label">Pseudo in-game</label>
          <input class="auth-input" type="text" id="a-pseudo" placeholder="Ton pseudo Star Atlas" autocomplete="username">
        </div>
        <div class="auth-field">
          <label class="auth-label">Token d'accès</label>
          <input class="auth-input" type="password" id="a-token" placeholder="ECL-XXXX-XXXX-XXXX" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <label class="auth-remember">
          <input type="checkbox" id="a-remember"> Rester connecté
        </label>
        <button class="auth-btn" onclick="doLogin()">✦ Accéder au Dashboard</button>
        <div class="auth-msg" id="auth-msg"></div>
      </div>
      <div class="auth-footer">Token fourni par l'administrateur</div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash">
  <div class="topbar">
    <div class="tb-left">
      <img src="https://osvalt16.github.io/Eclype_sa/Picsart_26-05-25_11-42-55-217.png" alt="Éclypse">
      <span class="tb-title">Dashboard · SAGE C4</span>
    </div>
    <div class="tb-right">
      <button class="tb-profil" onclick="ouvrirProfil()">
        <div class="avatar" id="nav-av">?</div>
        <span id="nav-pseudo">—</span>
      </button>
      <a href="admin.html" class="tb-btn" id="btn-admin" style="display:none;color:var(--rg);border-color:rgba(232,90,90,.25)">⚙ Admin</a>
      <a href="index.html" class="tb-btn">← Site</a>
      <button class="tb-btn danger" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="dash-wrap">
    <div class="profil-card">
      <div class="profil-av" id="p-av">?</div>
      <div>
        <div id="p-rang"></div>
        <div class="profil-pseudo">
          <span id="p-pseudo">—</span>
          <a id="p-xlink" href="#" target="_blank" class="profil-x" style="display:none">
            <img src="https://raw.githubusercontent.com/osvalt16/Eclype_sa/main/assets/x_logo.webp" alt="X">
          </a>
        </div>
        <div class="profil-role" id="p-role">—</div>
        <div class="roles-unlocked" id="p-roles" style="display:none"></div>
      </div>
      <button class="btn-edit-profil" onclick="ouvrirProfil()">✦ Modifier</button>
    </div>

    <div class="sec-hdr">
      <h2>📅 Opérations &amp; Planning</h2>
      <button class="btn-new" id="btn-new" onclick="toggleForm()">+ Nouvelle Op</button>
    </div>

    <div id="form-op">
      <div class="fg-grid">
        <div class="fg"><label>Nom *</label><input type="text" id="f-nom"></div>
        <div class="fg"><label>Type *</label>
          <select id="f-type">
            <option value="fleetop">Fleet Op</option>
            <option value="pvp">PvP / Guild War</option>
            <option value="mining">Mining Run</option>
            <option value="event">Événement SAGE</option>
          </select>
        </div>
        <div class="fg"><label>Date *</label><input type="date" id="f-date"></div>
        <div class="fg"><label>Heure (FR)</label><input type="time" id="f-heure" value="21:00"></div>
        <div class="fg full"><label>Description</label><textarea id="f-desc"></textarea></div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="toggleForm()">Annuler</button>
        <button class="btn-pub" onclick="saveEvent()">✦ Publier</button>
      </div>
    </div>

    <div class="plan-layout">
      <div>
        <div class="ftabs">
          <button class="ftab active" onclick="filterEv('tous',this)">Tous</button>
          <button class="ftab" onclick="filterEv('fleetop',this)">Fleet Op</button>
          <button class="ftab" onclick="filterEv('pvp',this)">PvP</button>
          <button class="ftab" onclick="filterEv('event',this)">Événements</button>
          <button class="ftab" onclick="filterEv('mining',this)">Mining</button>
        </div>
        <div class="ev-list" id="ev-list"><div class="ev-empty">Aucune opération planifiée.</div></div>
      </div>
      <div class="mini-cal">
        <div class="cal-hdr">
          <button class="cal-nav" onclick="calNav(-1)">&#8592;</button>
          <div class="cal-ttl" id="cal-ttl"></div>
          <button class="cal-nav" onclick="calNav(1)">&#8594;</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="cal-leg">
          <div class="cal-leg-t">Légende</div>
          <div class="leg-row"><div class="leg-dot" style="background:#e85a5a"></div>Fleet Op</div>
          <div class="leg-row"><div class="leg-dot" style="background:#8b5cf6"></div>PvP</div>
          <div class="leg-row"><div class="leg-dot" style="background:#c9a227"></div>Événement</div>
          <div class="leg-row"><div class="leg-dot" style="background:#5ecfa0"></div>Mining</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL PROFIL -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeProfil()">
  <div class="modal">
    <div class="modal-hdr">
      <h3>✦ Mon Profil</h3>
      <button class="modal-x" onclick="closeProfil()">✕</button>
    </div>
    <div class="modal-body">
      <div class="photo-zone">
        <div class="photo-prev" id="photo-prev" onclick="document.getElementById('photo-inp').click()">
          <span id="photo-init">?</span>
          <div class="photo-ov"><span>Changer</span></div>
        </div>
        <input type="file" id="photo-inp" accept="image/*" style="display:none" onchange="previewPhoto(event)">
        <button class="btn-up" id="btn-up" onclick="uploadPhoto()">⬆ Uploader</button>
        <div class="prog" id="prog"><div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div><div class="prog-lbl" id="prog-lbl"></div></div>
      </div>
      <div class="mf">
        <label>Pseudo in-game</label>
        <input type="text" id="m-pseudo">
        <div class="hint">Modifiable tous les 90 jours.</div>
      </div>
      <div class="mf">
        <label>Profil X</label>
        <div style="display:flex;align-items:center;gap:.7rem">
          <img src="https://raw.githubusercontent.com/osvalt16/Eclype_sa/main/assets/x_logo.webp" style="width:18px;height:18px;border-radius:50%;flex-shrink:0">
          <input type="url" id="m-xlink" placeholder="https://x.com/tonpseudo" style="flex:1">
        </div>
      </div>
      <div class="mmsg" id="mmsg"></div>
    </div>
    <div class="modal-ftr">
      <button class="btn-mcancel" onclick="closeProfil()">Annuler</button>
      <button class="btn-msave" onclick="saveProfil()">✦ Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const OWNER='osvalt16', REPO='Eclype_sa';
const RAW=`https://raw.githubusercontent.com/${OWNER}/${REPO}/main`;
const API=`https://api.github.com/repos/${OWNER}/${REPO}/contents`;
const IMGUR='546c25a59c58ad7';

let CU=null, allEv=[], photoFile=null, evFilter='tous';
let calY=new Date().getFullYear(), calM=new Date().getMonth();
const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS=['L','M','M','J','V','S','D'];

let _tok=null;
async function gTok(){
  if(_tok)return _tok;
  const l=localStorage.getItem('eck');
  if(l){_tok=l;return l;}
  const r=await fetch(`${RAW}/config.json?t=${Date.now()}`);
  const d=await r.json();
  _tok=d.p.join('');
  localStorage.setItem('eck',_tok);
  return _tok;
}

async function ghGet(f){
  const t=await gTok();
  const r=await fetch(`${API}/${f}`,{headers:{'Authorization':'token '+t}});
  const j=await r.json();
  return{sha:j.sha,data:JSON.parse(decodeURIComponent(escape(atob(j.content.split('\n').join('')))))};
}

async function ghPut(f,data,sha,msg){
  const t=await gTok();
  const c=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  await fetch(`${API}/${f}`,{method:'PUT',headers:{'Authorization':'token '+t,'Content-Type':'application/json'},body:JSON.stringify({message:msg,content:c,sha})});
}

async function doLogin(){
  const pseudo=document.getElementById('a-pseudo').value.trim();
  const token=document.getElementById('a-token').value.trim().toUpperCase();
  const msg=document.getElementById('auth-msg');
  msg.className='auth-msg';
  if(!pseudo||!token){msg.className='auth-msg err';msg.textContent='❌ Remplis les deux champs';return;}
  try{
    const {data}=await ghGet('users.json');
    const u=data.users.find(u=>u.pseudo.toLowerCase()===pseudo.toLowerCase()&&u.token.toUpperCase()===token);
    if(!u){msg.className='auth-msg err';msg.textContent='❌ Pseudo ou token incorrect';return;}
    if(!u.actif){msg.className='auth-msg err';msg.textContent='⏳ Compte en attente de validation.';return;}
    CU=u;
    const s=document.getElementById('a-remember').checked?localStorage:sessionStorage;
    s.setItem('eclypse_user',JSON.stringify(u));
    showDash(u);
  }catch(e){msg.className='auth-msg err';msg.textContent='❌ Erreur de connexion. Réessaie.';}
}

function showDash(u){
  document.getElementById('auth').style.display='none';
  document.getElementById('dash').style.display='block';
  document.getElementById('nav-pseudo').textContent=u.pseudo;
  document.getElementById('p-pseudo').textContent=u.pseudo;
  const rang=u.rang||'Membre';
  const gc=rang.toLowerCase().replace(/[éè]/g,'e').replace('vétéran','veteran').replace('sous-officier','sousofficier').replace(/ /g,'');
  const icons={apply:'⚪',membre:'🔵',veteran:'⭐',sousofficier:'🟠',officier:'🔴'};
  document.getElementById('p-rang').innerHTML=`<span class="grade-badge ${gc}">${icons[gc]||'🔵'} ${rang}</span>`;
  const rMap={veteran:['RH','Aspirant FC','Recruteur','Logistique'],sousofficier:['Skirmish FC','Team SRP'],officier:['Diplomate','Tactical FC']};
  const rl=rMap[gc]||[];
  const re=document.getElementById('p-roles');
  if(rl.length){re.innerHTML=rl.map(r=>`<span class="role-tag">${r}</span>`).join('');re.style.display='flex';}
  document.getElementById('p-role').textContent=[u.role,u.faction?'Faction '+u.faction:''].filter(Boolean).join(' · ');
  setAv(u);
  if(u.x_link){const x=document.getElementById('p-xlink');x.href=u.x_link;x.style.display='inline-flex';}
  if(u.dashboard||u.admin)document.getElementById('btn-new').style.display='';
  if(u.admin)document.getElementById('btn-admin').style.display='inline-block';
  loadEv();
}

function setAv(u){
  ['p-av','nav-av'].forEach(id=>{
    const el=document.getElementById(id);
    el.innerHTML=u.photo?`<img src="${u.photo}" alt="${u.pseudo}">`:'';
    if(!u.photo)el.textContent=u.pseudo[0].toUpperCase();
  });
}

function logout(){
  localStorage.removeItem('eclypse_user');sessionStorage.removeItem('eclypse_user');
  CU=null;document.getElementById('auth').style.display='flex';document.getElementById('dash').style.display='none';
}

async function loadEv(){
  try{const {data}=await ghGet('events.json');allEv=data.events||[];}catch(e){allEv=[];}
  renderEv();
}

function renderEv(){
  const list=document.getElementById('ev-list');
  const types={fleetop:'Fleet Op',pvp:'PvP',mining:'Mining',event:'Événement'};
  const cls={fleetop:'t-fo',pvp:'t-pv',mining:'t-mi',event:'t-ev'};
  const now=new Date();now.setHours(0,0,0,0);
  const items=evFilter==='tous'?allEv:allEv.filter(e=>e.type===evFilter);
  if(!items.length){list.innerHTML='<div class="ev-empty">Aucune opération planifiée.</div>';renderCal();return;}
  list.innerHTML=items.sort((a,b)=>new Date(a.date)-new Date(b.date)).map(ev=>{
    const d=new Date(ev.date+'T00:00:00'),past=d<now;
    const canDel=CU&&(CU.dashboard||CU.admin);
    return `<div class="ev-item"${past?' style="opacity:.5"':''}>
      <div class="ev-date"><div class="d">${d.getDate()}</div><div class="m">${d.toLocaleDateString('fr-FR',{month:'short'})}</div></div>
      <div><span class="ev-tag ${cls[ev.type]||'t-ev'}">${types[ev.type]||ev.type}</span>
        <div class="ev-nom">${ev.nom}${past?' ✓':''}</div>
        <div class="ev-meta">${ev.heure||''}h FR · ${ev.description||''}</div></div>
      <div>${canDel?`<button class="btn-del" onclick="delEv('${ev.id}')">Supprimer</button>`:''}</div>
    </div>`;
  }).join('');
  renderCal();
}

function filterEv(t,btn){evFilter=t;document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderEv();}
function toggleForm(){const f=document.getElementById('form-op');f.classList.toggle('show');if(f.classList.contains('show'))document.getElementById('f-date').value=new Date().toISOString().split('T')[0];}

async function saveEvent(){
  const nom=document.getElementById('f-nom').value.trim(),date=document.getElementById('f-date').value;
  if(!nom||!date){showToast('❌ Nom et date requis');return;}
  const ev={id:'ev_'+Date.now(),nom,type:document.getElementById('f-type').value,date,heure:document.getElementById('f-heure').value,description:document.getElementById('f-desc').value.trim(),createdBy:CU.pseudo,createdAt:new Date().toISOString()};
  allEv.push(ev);
  const {sha}=await ghGet('events.json');
  await ghPut('events.json',{events:allEv},sha,'Add event: '+nom);
  document.getElementById('form-op').classList.remove('show');
  document.getElementById('f-nom').value='';document.getElementById('f-desc').value='';
  renderEv();showToast('✦ Opération publiée !');
}

async function delEv(id){
  if(!confirm('Supprimer ?'))return;
  allEv=allEv.filter(e=>e.id!==id);
  const {sha}=await ghGet('events.json');
  await ghPut('events.json',{events:allEv},sha,'Delete event '+id);
  renderEv();
}

function renderCal(){
  const grid=document.getElementById('cal-grid'),lbl=document.getElementById('cal-ttl');
  if(!grid)return;
  lbl.textContent=MONTHS[calM]+' '+calY;
  const em={};allEv.forEach(ev=>{const d=new Date(ev.date+'T00:00:00');if(d.getFullYear()===calY&&d.getMonth()===calM)em[d.getDate()]=true;});
  const fd=new Date(calY,calM,1).getDay(),off=fd===0?6:fd-1,tot=new Date(calY,calM+1,0).getDate();
  const today=new Date();
  let h=DAYS.map(d=>`<div class="cal-dl">${d}</div>`).join('');
  for(let i=0;i<off;i++)h+='<div class="cal-d empty"></div>';
  for(let d=1;d<=tot;d++){const isT=d===today.getDate()&&calM===today.getMonth()&&calY===today.getFullYear();h+=`<div class="cal-d${em[d]?' ev':''}${isT?' today':''}">${d}</div>`;}
  grid.innerHTML=h;
}
function calNav(dir){calM+=dir;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCal();}

function ouvrirProfil(){
  if(!CU)return;
  document.getElementById('m-pseudo').value=CU.pseudo;
  document.getElementById('m-xlink').value=CU.x_link||'';
  document.getElementById('mmsg').className='mmsg';
  photoFile=null;document.getElementById('btn-up').style.display='none';document.getElementById('prog').classList.remove('show');
  const pp=document.getElementById('photo-prev');
  pp.innerHTML=CU.photo?`<img src="${CU.photo}" alt=""><div class="photo-ov"><span>Changer</span></div>`:`<span>${CU.pseudo[0].toUpperCase()}</span><div class="photo-ov"><span>Changer</span></div>`;
  document.getElementById('modal').classList.add('open');
}
function closeProfil(){document.getElementById('modal').classList.remove('open');}

function previewPhoto(e){
  const f=e.target.files[0];if(!f||f.size>5*1024*1024){showToast('❌ Max 5Mo');return;}
  const r=new FileReader();
  r.onload=ev=>{photoFile=f;document.getElementById('photo-prev').innerHTML=`<img src="${ev.target.result}" alt=""><div class="photo-ov"><span>Changer</span></div>`;document.getElementById('btn-up').style.display='inline-block';};
  r.readAsDataURL(f);
}

async function uploadPhoto(){
  if(!photoFile)return;
  const prog=document.getElementById('prog'),fill=document.getElementById('prog-fill'),lbl=document.getElementById('prog-lbl');
  prog.classList.add('show');fill.style.width='40%';lbl.textContent='Upload vers Imgur…';
  try{
    const fd=new FormData();fd.append('image',photoFile);
    const r=await fetch('https://api.imgur.com/3/image',{method:'POST',headers:{'Authorization':'Client-ID '+IMGUR},body:fd});
    const j=await r.json();
    if(!j.success)throw new Error(j.data?.error||'Erreur Imgur');
    fill.style.width='80%';lbl.textContent='Sauvegarde…';
    const url=j.data.link;
    const {sha,data}=await ghGet('users.json');
    const idx=data.users.findIndex(u=>u.id===CU.id);
    if(idx!==-1)data.users[idx].photo=url;
    await ghPut('users.json',data,sha,'Update photo: '+CU.pseudo);
    CU.photo=url;localStorage.setItem('eclypse_user',JSON.stringify(CU));
    fill.style.width='100%';lbl.textContent='✓ Photo mise à jour !';
    setAv(CU);photoFile=null;document.getElementById('btn-up').style.display='none';
    showMMsg('✦ Photo mise à jour !','ok');
  }catch(e){fill.style.background='var(--rg)';lbl.textContent='❌ '+e.message;}
}

async function saveProfil(){
  const pseudo=document.getElementById('m-pseudo').value.trim();
  const xLink=document.getElementById('m-xlink').value.trim();
  const upd={};
  if(pseudo&&pseudo!==CU.pseudo){
    const last=CU.lastProfileEdit;
    if(last&&Math.floor((Date.now()-new Date(last))/86400000)<90){showMMsg('❌ 90 jours requis','err');return;}
    upd.pseudo=pseudo;upd.lastProfileEdit=new Date().toISOString();
  }
  if(xLink!==(CU.x_link||''))upd.x_link=xLink;
  if(!Object.keys(upd).length){showMMsg('Aucune modification.','ok');return;}
  showMMsg('⏳ Sauvegarde…','ok');
  const {sha,data}=await ghGet('users.json');
  const idx=data.users.findIndex(u=>u.id===CU.id);
  if(idx!==-1)Object.assign(data.users[idx],upd);
  await ghPut('users.json',data,sha,'Update profile: '+CU.pseudo);
  Object.assign(CU,upd);localStorage.setItem('eclypse_user',JSON.stringify(CU));
  document.getElementById('nav-pseudo').textContent=CU.pseudo;document.getElementById('p-pseudo').textContent=CU.pseudo;
  const x=document.getElementById('p-xlink');
  if(CU.x_link){x.href=CU.x_link;x.style.display='inline-flex';}else x.style.display='none';
  showMMsg('✦ Profil mis à jour !','ok');setTimeout(closeProfil,1500);
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',3000);}
function showMMsg(msg,type){const el=document.getElementById('mmsg');el.textContent=msg;el.className='mmsg '+type;}

const saved=localStorage.getItem('eclypse_user')||sessionStorage.getItem('eclypse_user');
if(saved){CU=JSON.parse(saved);showDash(CU);}
</script>
</body>
</html>
